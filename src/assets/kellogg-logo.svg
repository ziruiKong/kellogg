<svg width="560" height="120" viewBox="0 0 560 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kellogg Precision Logo</title>
  <desc id="desc">Stylized K mark with Kellogg Precision wordmark.</desc>
  <defs>
    <linearGradient id="kDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15263E"/>
      <stop offset="100%" stop-color="#0F1D32"/>
    </linearGradient>
    <linearGradient id="kLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C5CAD0"/>
      <stop offset="100%" stop-color="#AEB4BB"/>
    </linearGradient>
  </defs>

  <!-- K mark -->
  <path d="M16 16H41V54L30 65L41 76V104L16 80V16Z" fill="url(#kDark)"/>
  <path d="M31 65L82 16H116L65 65H31Z" fill="url(#kLight)"/>
  <path d="M31 65H65L116 116H84L31 65Z" fill="url(#kDark)"/>

  <!-- wordmark -->
  <g fill="#13243B" font-family="'Montserrat','Segoe UI',sans-serif" dominant-baseline="middle">
    <text x="150" y="62" font-size="50" font-weight="600" letter-spacing="8">KELLOGG</text>
    <text x="150" y="102" font-size="24" font-weight="500" letter-spacing="12">PRECISION</text>
  </g>
</svg>
